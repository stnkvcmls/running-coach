[alembic]
# Path to the migration scripts directory (relative to this file).
script_location = alembic

# Add the project root to sys.path so that "from app..." imports work.
prepend_sys_path = .

# The database URL is set dynamically in env.py from app.config.settings,
# so the value here is only a placeholder used by alembic --help output.
sqlalchemy.url = sqlite:////data/running_coach.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
